name: fuelwindow
description: Metabolic fueling guidance for athletes — informed physiology estimates.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Navigation
  go_router: ^13.0.0
  # State management — ChangeNotifier-based for speed, Provider for DI
  provider: ^6.1.2
  # Charts
  fl_chart: ^0.68.0
  # Local persistence
  shared_preferences: ^2.2.3
  # Supabase (activated when credentials available)
  supabase_flutter: ^2.5.0
  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  http: ^1.6.0
  image_picker: ^1.2.1
  web: ^1.1.1
  # Icons
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
